<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Sobre mí - One Piece API</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="../img/icon.png">
</head>

<body>
    <header>
        <h1>⚓ SOBRE MÍ ⚓</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="luffy.html">Luffy</a></li>
                <li><a href="sobremi.html">Sobre mí</a></li>
            </ul>
        </nav>
    </header>

    <main class="sobremi-main">
        <div class="wanted-poster sobremi-poster">
            <div class="wanted-header">
                <span class="wanted-stamp">WANTED</span>
                <div class="wanted-dead-or-alive">DEAD OR ALIVE</div>
            </div>

            <div class="wanted-image placeholder">
                <div class="avatar-placeholder">
                    <img src="../img/Yo.jpeg" alt="SAMUEL RUIZ MARTIN">
                </div>
            </div>

            <div class="wanted-name">SAMUEL RUIZ MARTIN</div>

            <div class="wanted-bounty">
                <span class="bounty-label">REWARD</span>
                <span class="bounty-amount">∞฿</span>
            </div>

            <div class="wanted-details">
                <div class="detail-row">
                    <span class="detail-label">Ciclo:</span>
                    <span class="detail-value">DAM - 1º año</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Rol:</span>
                    <span class="detail-value">Futuro Rey de los Programadores</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Fruta DF:</span>
                    <span class="detail-value">💻 Code Code no Mi</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Edad:</span>
                    <span class="detail-value">18 años</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Altura:</span>
                    <span class="detail-value">1.80 m</span>
                </div>
            </div>

            <div class="wanted-footer">
                <span class="marine-seal">MARINE</span>
                <span class="world-government">WORLD GOVERNMENT</span>
            </div>
        </div>
    </main>

    <footer>
        <p>Proyecto One Piece - Sobre mí</p>
    </footer>
</body>

</html>
